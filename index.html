<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection | Funko Pops & Action Figures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Parallax Background -->
    <div class="parallax-bg"></div>
    <div class="floating-particles" id="particles"></div>

    <!-- Wishlist Badge -->
    <div class="wishlist-badge" id="wishlistBadge">
        <span class="icon">⭐</span>
        <span class="count" id="wishlistCount">0</span>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">
                <span class="title-icon">🎮</span>
                Private Collection
            </h1>
            <p class="subtitle">Funko Pops & Action Figures</p>
            <p class="author">by KiderX</p>
        </header>

        <!-- Search Bar -->
        <div class="search-container">
            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="Search by character name..."
                autocomplete="off"
            >
            <div class="search-icon">🔍</div>
        </div>

        <!-- Filters -->
        <div class="controls scroll-reveal">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">
                    All
                </button>
                <button class="filter-btn" data-filter="funko">
                    Funko Pops
                </button>
                <button class="filter-btn" data-filter="figure">
                    Action Figures
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats scroll-reveal">
            <div class="stat-card stat-card-value">
                <span class="stat-icon">💎</span>
                <span class="stat-number stat-value" id="collectionValue">$0</span>
                <span class="stat-label">Collection Value</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="totalCount">0</span>
                <span class="stat-label">Total Items</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="displayCount">0</span>
                <span class="stat-label">Showing</span>
            </div>
        </div>

        <!-- Collection Divider -->
        <div class="section-divider">
            <div class="divider-line"></div>
            <div class="divider-icon">✨</div>
            <div class="divider-line"></div>
        </div>

        <!-- Collection Grid -->
        <div class="carousel-container">
            <button class="carousel-nav prev" id="carouselPrev" style="display: none;">‹</button>
            <div id="collectionGrid" class="grid">
                <!-- Cards will be inserted here by JavaScript -->
            </div>
            <button class="carousel-nav next" id="carouselNext" style="display: none;">›</button>
        </div>

        <!-- No Results Message -->
        <div id="noResults" class="no-results" style="display: none;">
            <div class="no-results-icon">🔍</div>
            <p>No items found matching your search</p>
        </div>

        <!-- Wishlist Section -->
        <div id="wishlistSection" class="wishlist-section" style="display: none;">
            <!-- Wishlist Divider -->
            <div class="section-divider">
                <div class="divider-line"></div>
                <div class="divider-icon">✨</div>
                <div class="divider-line"></div>
            </div>

            <div class="section-header">
                <h2 class="section-title">Wishlist</h2>
            </div>
            <div id="wishlistGrid" class="grid">
                <!-- Wishlist cards will be inserted here -->
            </div>
            <div id="emptyWishlist" class="no-results" style="display: none;">
                <div class="no-results-icon">⭐</div>
                <p>Your wishlist is empty. Click ☆ on items to add them!</p>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="image-modal" id="imageModal">
        <div class="modal-close" id="modalClose">×</div>
        <div class="modal-content">
            <div class="modal-image-container">
                <img src="" alt="" class="modal-image" id="modalImage">
                <div class="modal-caption">
                    <div class="modal-name" id="modalName"></div>
                    <div class="modal-type" id="modalType"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
